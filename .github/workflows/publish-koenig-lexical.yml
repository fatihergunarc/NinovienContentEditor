name: Publish koenig-lexical

on:
  push:
    branches:
      - main
    paths:
      - 'packages/koenig-lexical/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts --no-workspaces
        working-directory: packages/koenig-lexical

      - name: Build
        run: npm run build
        working-directory: packages/koenig-lexical

      - name: Bump patch version
        id: bump
        run: |
          cd packages/koenig-lexical
          # Bump the patch version by editing only the version field of
          # package.json. We avoid `npm version` (it reconciles the whole
          # workspace dep tree -> ERESOLVE on the vitest peer mismatch, and
          # runs the preversion hook). We bump from max(package.json, latest
          # published on npm) so a package.json that has drifted behind npm
          # (e.g. earlier manual publishes) can't produce an already-taken
          # version and fail `npm publish` with E403.
          node -e 'const{execSync}=require("child_process");const fs=require("fs");let s=fs.readFileSync("package.json","utf8");const pv=JSON.parse(s).version;let nv="0.0.0";try{nv=execSync("npm view @fatih_ergun/koenig-lexical version",{encoding:"utf8"}).trim()||"0.0.0"}catch(e){console.log("npm view failed, falling back to package.json version")}const cmp=(a,b)=>{const A=a.split(".").map(Number),B=b.split(".").map(Number);for(let i=0;i<3;i++)if(A[i]!==B[i])return A[i]-B[i];return 0};const base=cmp(pv,nv)>=0?pv:nv;const v=base.split(".").map(Number);v[2]++;const next=v.join(".");if(!/^\d+\.\d+\.\d+$/.test(next))throw new Error("bad next version: "+next);s=s.replace(/("version":\s*")\d+\.\d+\.\d+(")/,"$1"+next+"$2");fs.writeFileSync("package.json",s);fs.appendFileSync(process.env.GITHUB_OUTPUT,"version="+next+"\n");console.log("pkg="+pv+" npm="+nv+" -> "+next)'

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/koenig-lexical/package.json
          git commit -m "chore: bump koenig-lexical to v${{ steps.bump.outputs.version }}"
          git push

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        working-directory: packages/koenig-lexical
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
