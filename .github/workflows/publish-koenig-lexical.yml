name: Publish koenig-lexical

on:
  push:
    branches:
      - main
    paths:
      - 'packages/koenig-lexical/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts --no-workspaces
        working-directory: packages/koenig-lexical

      - name: Build
        run: npm run build
        working-directory: packages/koenig-lexical

      - name: Bump patch version
        id: bump
        run: |
          cd packages/koenig-lexical
          # Bump the patch version by editing only the version field of
          # package.json. We avoid `npm version`, which reconciles the whole
          # workspace dependency tree and fails ERESOLVE on the pre-existing
          # vitest peer mismatch (and also runs the preversion hook).
          node -e 'const fs=require("fs");let s=fs.readFileSync("package.json","utf8");const m=s.match(/"version":\s*"(\d+)\.(\d+)\.(\d+)"/);if(!m)throw new Error("version not found");const next=m[1]+"."+m[2]+"."+(Number(m[3])+1);s=s.replace(/("version":\s*")\d+\.\d+\.\d+(")/,"$1"+next+"$2");fs.writeFileSync("package.json",s);fs.appendFileSync(process.env.GITHUB_OUTPUT,"version="+next+"\n");console.log("Bumped koenig-lexical to "+next)'

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/koenig-lexical/package.json
          git commit -m "chore: bump koenig-lexical to v${{ steps.bump.outputs.version }}"
          git push

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        working-directory: packages/koenig-lexical
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
